<!doctype html>
<!--
  The lang attribute below is the initial value. It must match the
  `LOCALE` constant in src/lib/site.config.ts. The root layout also sets
  `document.documentElement.lang` at runtime from LOCALE, so the visible
  value is always correct in JS-enabled browsers.
-->
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A Germany-based sportswear production agency coordinating custom sportswear manufacturing through a vetted partner network in Pakistan, Turkey, Portugal, and China."
    />
    <meta
      name="keywords"
      content="sportswear agency, custom sportswear, sportswear production, OEM, private label, athletic apparel, teamwear, football kits, low MOQ"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="min-h-screen flex flex-col">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
